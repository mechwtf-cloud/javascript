<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pirate Slots Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ Pirate Slots Adventure</h1>
        <p>Spin the reels and strike gold! Match symbols to win big!</p>

        <div class="stats-bar">
            <div class="stat">
                <span class="label">Gold:</span>
                <span id="balance" class="balance-amount">$1,000</span>
            </div>
            <div class="stat">
                <span class="label">Bet:</span>
                <span id="currentBet" class="bet-amount">$0</span>
            </div>
        </div>

        <div class="betting-box">
            <label for="betInput">How much gold will you bet?</label>
            <input type="number" id="betInput" min="10" step="10" placeholder="Enter 10 or more">
            <button id="placeBetBtn">Spin!</button>
        </div>

        <div id="betStatus" class="bet-status"></div>

        <div class="game-box" id="gameBox" style="display: none;">
            <div class="slot-machine">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍋</div>
                <div class="reel" id="reel3">🍊</div>
            </div>
            <button id="spinBtn" class="spin-btn">Spin the Reels!</button>
        </div>

        <div id="feedback" class="feedback"></div>

        <button id="resetBtn" class="reset-btn" style="display: none;">Play Again</button>
        <button id="cashOutBtn" class="cashout-btn" style="display: none;">Cash Out</button>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
