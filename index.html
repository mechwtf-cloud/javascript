<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pirate Slots Adventure</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background: radial-gradient(circle at top, #2b3b55 0%, #081520 70%);
            color: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(15, 27, 46, 0.95);
            padding: 2rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 235, 156, 0.15);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            color: #f9d66b;
            margin-top: 0;
            letter-spacing: 1px;
        }

        p {
            color: #d8d8d8;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 1rem;
            border-radius: 14px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat .label {
            color: #c5c8d1;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .balance-amount {
            font-size: 1.9rem;
            font-weight: 900;
            color: #f9d66b;
        }

        .bet-amount {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f1a661;
        }

        .betting-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(249, 214, 107, 0.2);
        }

        .betting-box label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: #f1f0e8;
        }

        input[type="number"] {
            padding: 0.85rem;
            font-size: 1rem;
            width: 100%;
            max-width: 260px;
            border: 2px solid rgba(249, 214, 107, 0.4);
            border-radius: 8px;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f5;
        }

        input[type="number"]::placeholder {
            color: #c5c8d1;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #f9d66b;
            box-shadow: 0 0 10px rgba(249, 214, 107, 0.25);
        }

        .bet-status {
            font-size: 1.05rem;
            font-weight: 700;
            color: #ced4da;
            margin-bottom: 1rem;
            min-height: 2rem;
        }

        .bet-status.active {
            color: #ffeaa7;
            background: rgba(255, 234, 113, 0.12);
            padding: 0.85rem 1rem;
            border-radius: 10px;
        }

        .game-box {
            margin: 2rem 0;
        }

        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .reel {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #f9d66b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.3s ease;
        }

        .reel.spinning {
            animation: spin 1s ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }

        .spin-btn,
        #placeBetBtn,
        .reset-btn,
        .cashout-btn {
            padding: 0.85rem 1.4rem;
            font-size: 1rem;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.25s ease, transform 0.2s ease;
            margin: 0.4rem;
        }

        .spin-btn {
            background-color: #f9d66b;
            color: #1f1b10;
        }

        .spin-btn:hover {
            background-color: #ffd858;
        }

        .spin-btn:disabled,
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #placeBetBtn {
            background-color: #f9d66b;
            color: #1f1b10;
        }

        #placeBetBtn:hover {
            background-color: #ffd858;
        }

        .reset-btn {
            background-color: #4ba55d;
        }

        .reset-btn:hover {
            background-color: #3a8c4a;
        }

        .cashout-btn {
            background-color: #5a8dc9;
        }

        .cashout-btn:hover {
            background-color: #4574ad;
        }

        .feedback {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 1.5rem 0;
            min-height: 2.5rem;
            padding: 1rem;
            border-radius: 14px;
        }

        .feedback.error {
            color: #f8d7da;
            background-color: #6d1f33;
            border: 1px solid #a23a53;
        }

        .feedback.win {
            color: #153f1b;
            background-color: #d4f7d4;
            border: 1px solid #7ac27f;
        }

        .feedback.lose {
            color: #3e1f28;
            background-color: #f7d4d4;
            border: 1px solid #d77c8e;
        }

        .feedback.info {
            color: #fdf6e3;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏴‍☠️ Pirate Slots Adventure</h1>
        <p>Spin the reels and strike gold! Match symbols to win big!</p>

        <div class="stats-bar">
            <div class="stat">
                <span class="label">Gold:</span>
                <span id="balance" class="balance-amount">$1,000</span>
            </div>
            <div class="stat">
                <span class="label">Bet:</span>
                <span id="currentBet" class="bet-amount">$0</span>
            </div>
        </div>

        <div class="betting-box">
            <label for="betInput">How much gold will you bet?</label>
            <input type="number" id="betInput" min="10" step="10" placeholder="Enter 10 or more">
            <button id="placeBetBtn">Spin!</button>
        </div>

        <div id="betStatus" class="bet-status"></div>

        <div class="game-box" id="gameBox" style="display: none;">
            <div class="slot-machine">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍋</div>
                <div class="reel" id="reel3">🍊</div>
            </div>
            <button id="spinBtn" class="spin-btn">Spin the Reels!</button>
        </div>

        <div id="feedback" class="feedback"></div>

        <button id="resetBtn" class="reset-btn" style="display: none;">Play Again</button>
        <button id="cashOutBtn" class="cashout-btn" style="display: none;">Cash Out</button>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
