<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Combo Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <h1>Key Combo Game</h1>
    <div id="info">Press SPACE to start. Press P to pause.</div>
    <div id="combo">Match the falling key near the hit line.</div>
    <div id="scoreboard">Score: <span id="score">0</span></div>
    <div id="feedback">Ready</div>
  </div>

  <div id="game">
    <div id="hitLine"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
